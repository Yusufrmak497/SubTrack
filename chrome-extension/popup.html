<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>TinyVault Extension</title>
  <link rel="stylesheet" href="popup.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
  <div class="header">
    <div class="header-logo">V</div>
    <div class="header-text">
        <h2>TinyVault</h2>
        <p>Save from Active Tab</p>
    </div>
  </div>
  
  <form id="add-form">
    <div class="form-group">
      <label>Service Name</label>
      <input type="text" id="service_name" placeholder="Netflix" required>
    </div>
    
    <div class="form-group">
      <label>Monthly Amount ($)</label>
      <input type="number" id="amount" step="0.01" placeholder="10.99" required>
    </div>
    
    <div class="form-group">
      <label>Billing Cycle</label>
      <div class="select-container">
        <select id="billing_cycle" required>
            <option value="Monthly">Monthly</option>
            <option value="Yearly">Yearly</option>
        </select>
      </div>
    </div>
    
    <button type="submit" id="submit-btn" class="primary-btn">Save to Vault</button>
  </form>
  
  <div id="status-msg" class="hidden"></div>
  
  <script src="popup.js"></script>
</body>
</html>
